bundle:
  name: sap_bdc_publisher
  engine: terraform

variables:
  project_name:
    description: "Solution accelerator name"
    default: "sap-bdc-publisher"

  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

targets:
  dev:
    default: true
    mode: development
    presets:
      source_linked_deployment: false

resources:
  apps:
    bdc_sharing_app:
      name: "bdc-sharing"
      description: "Publish Unity Catalog shares to SAP Business Data Cloud"
      source_code_path: "./apps/bdc-sharing"
      user_api_scopes:
        - sql

  jobs:
    deploy_bdc_sharing_app:
      name: "${var.project_name} - Deploy bdc-sharing app source"
      tasks:
        - task_key: deploy
          notebook_task:
            notebook_path: "./notebooks/deploy_app.py"
            base_parameters:
              app_name: "bdc-sharing"
              source_code_path: "${workspace.file_path}/apps/bdc-sharing"
          environment_key: bdc_env
      environments:
        - environment_key: bdc_env
          spec:
            client: "2"
            dependencies: []
