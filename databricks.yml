bundle:
  name: sap_bdc_publisher

variables:
  project_name:
    description: "Solution accelerator name"
    default: "sap-bdc-publisher"

  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

targets:
  dev:
    default: true
    mode: development

resources:
  apps:
    bdc_sharing_app:
      name: "bdc-sharing"
      description: "Publish Unity Catalog shares to SAP Business Data Cloud"
      source_code_path: "/Users/${workspace.current_user.userName}/${var.project_name}-${var.environment}/files/apps/bdc-sharing"
      user_api_scopes:
        - sql

  jobs:
    demo_workflow:
      name: "${var.project_name} - SDK smoke test"
      tasks:
        - task_key: smoke
          notebook_task:
            notebook_path: "./notebooks/00_smoke.py"
          environment_key: bdc_env
      environments:
        - environment_key: bdc_env
          spec:
            client: "2"
            dependencies:
              - sap-bdc-connect-sdk
